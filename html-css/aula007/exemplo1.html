<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>

        table {
            width: 400px;  /* Largura da tabela */
            height: 270px; /* Altura da tabela */
            border-collapse: collapse; /* 'gruda' os dados */
        }

        td {
            border: 1px solid black;  /* Borda nos dados   */
            padding: 8px;               /* Padding nos dados */
            text-align: center;  /* Centraliza os dasdos horizontalmente */
            vertical-align: top; /* Alinha verticalmente os dados */
        }

    </style>
</head>

<body>
    <h1>Criando Tabelas</h1>
    <br><br>
    <!--
        HIERARQUIA DE TABELAS (simples)
        TABLE = tabela
            TABLE ROW = linha de tabela
                TABLE HEADER = cabeçalho de tabela
                TABLE DATA = dado de tabela
    -->

    <table>  <!-- Cria uma tabela -->

        <tr> <!-- Primeira linha -->
            <td>A1</td> <!-- linha 1 coluna 1-->
            <td>B1</td> <!-- linha 1 coluna 1-->
            <td>C1</td> <!-- linha 1 coluna 1-->
        </tr>

        <tr>  <!-- Segunda linha -->
            <td>A2</td> <!-- linha 1 coluna 1-->
            <td>B2</td> <!-- linha 1 coluna 1-->
            <td>C2</td> <!-- linha 1 coluna 1-->
        </tr>


    </table>

</body>
</html>
