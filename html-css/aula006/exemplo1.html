<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {

            /* Podemos atribuir um valor para todos 
            os lados de um mesmo elemento */
            padding: 10px;
            /* Entretanto também podemos escolher valores
            diferentes para cada lado */
            padding-top: 10px;    /* Acima    */
            padding-bottom: 5px;  /* Abaixo   */
            padding-left: 5px;    /* Esquerda */
            padding-right: 20px;  /* Direita  */
            
            /* 2 valores juntos: 
            1° valor: cima e baixo - 2° valor */
            margin: 10px 5px;
            /* 4 valores juntos, sentido horário: 
            cima -> direita -> baixo -> esquerda */
            margin: 10px 5px 20px 5px;

            /* Arredonda os 4 cantos */
            border-radius: 20px;
            /* Cima-esquerda e baixo-direita */
            border-radius: 10px 50px;
            /* Cima-esq., cima-dir. e baixo-esq., baixo-dir. */
            border-radius: 10px 20px 30px;
            /* Sentido horário: cima-esquerda, cima-direita
            baixo-direita e baixo-esquerda */
            border-radius: 10px 20px 30px 40px;
        }
    </style>
</head>
<body>
    
</body>
</html>
