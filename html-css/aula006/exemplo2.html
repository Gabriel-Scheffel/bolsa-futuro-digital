<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            background-image: url(target001.png);
            background-size: 100% 100%;
            background-position: center center;
        }

        div#container {
            height: 1600px;
            width: 2000px;
            margin: 5px;
            background-color: darkgreen;
            /* Todo container tem posição absoluta */
            position: relative;
        }
        div#conteudo {
            height: 500px;
            width: 900px;
            background-color: yellow;
            /* Definimos a posição absoluta no conteúdo */
            position: absolute;
            left: 50%;          /* Distância à esquerda */
            top: 50%;           /* Distância do topo    */
            /* Para centralizar efetivamente o conteúdo */
            transform: translate(-50%, -50%);
        }

    </style>
</head>
<body>
    <div id="container">
        <div id="conteudo">

        </div>
    </div>
</body>
</html>
