<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div {
            border: 2px solid black;
            border-radius: 8px;
            padding: 15px;
            width: 220px;
            margin: auto;
        }
    </style>
</head>
<body>
    <div>
        <h1>Cadastro</h1>
        <form action="info.php" method="post" autocomplete="on">
        
            <p>
                <label for="ius">Usuário:</label>
                <input type="text" name="us" id="ius" required minlength="5" maxlength="15" placeholder="nome de usuário" size="15">
            </p>
        
            <p>
                <label for="isen">Senha:</label>
                <input type="password" name="sen" id="isen" required minlength="8" maxlength="18" size="15" placeholder="mínimo de 8 letras">
            </p>
        
            <p>
                <input type="submit" value="Enviar">
                <input type="reset" value="Limpar">
            </p>
        
        </form>
    </div>
</body>
</html>
