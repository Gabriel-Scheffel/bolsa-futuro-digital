<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Criando Formulários</h1>

    <!-- action diz para onde os dados são enviados -->
    <form action="info.php"> <!-- php faz o backend -->
        <!-- type="text" cria uma caixa que recebe um texto -->
        <p>Nome: <input type="text" name="nome" id="nome"></p>
        <!-- name e id são usados para identificar a caixa  -->
        <p>Cidade: <input type="text" name="cidade" id="cidade"></p>
        <!-- type="submit" cria um botão para enviar o texto -->
        <!-- value recebe o texto que aparece no botão -->
        <p><input type="submit" value="Enviar"></p>
    </form>

</body>
</html>
