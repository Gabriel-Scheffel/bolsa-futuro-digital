<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <style>
    div {
        border: 2px solid black;
        padding: 8px;
        margin-bottom: 5px;
    }

    div > img {
        max-width: 70%;
        display: block;
        margin: auto;
    }
    </style>
</head>
<body>
    <h1>Imagens de Diferentes tamanhos</h1>

    <div id="foto-pequena">
        <h2>Imagem pequena</h2>
        <img class="pequena" src="../imagens/poa-pequeno.jpg" alt="foto de poa">
    </div>

    <div id="foto-media">
        <h2>Imagem media</h2>
        <img class="media" src="../imagens/poa-medio.jpg" alt="foto de poa">
    </div>

    <div id="foto-grande">
        <h2>Imagem grande</h2>
        <img class="pequena" src="../imagens/poa-grande.jpg" alt="foto de poa">
    </div>
</body>
</html>
