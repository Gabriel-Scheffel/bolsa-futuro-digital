<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 01</title>
</head>
<body>
    <h1>Listas de itens</h1>
    <h2>Lista não-numerada:</h2>
    <ul>
        <li> item 1 </li>
        <li> item 2 </li>
        <li> item 3 </li>
    </ul>

    <h2>Lista numerada:</h2>
    <ol type="I">
        <li> item 1 </li>
        <li> item 2 </li>
        <li> item 3 </li>
    </ol>

    <p>A tag &lt;a&gt; cria links clicáveis: <a href="#">LINK</a> </p>

    <ul>
        <li><a href="exemplo1.html" target="_blank">exemplo1</a></li>
        <li><a href="exemplo2.html">exemplo2</a></li>
    </ul>
</body>
</html>
